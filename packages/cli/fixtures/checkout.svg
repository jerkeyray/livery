<svg xmlns="http://www.w3.org/2000/svg" width="640" height="162" viewBox="0 0 640 162" role="img" aria-labelledby="checkout-title checkout-desc">
  <title id="checkout-title">Checkout fixture</title>
  <desc id="checkout-desc">Checkout fixture: 4 elements and 2 connections.</desc>
  <rect width="640" height="162" fill="#f8f9fa"/>
  <defs>
    <marker id="checkout-arrow-submission" markerWidth="5" markerHeight="5" refX="4.6" refY="2.5" orient="auto"><path d="M 0 0 L 5 2.5 L 0 5 z" fill="#8793a2"/></marker>
    <marker id="checkout-arrow-persistence" markerWidth="5" markerHeight="5" refX="4.6" refY="2.5" orient="auto"><path d="M 0 0 L 5 2.5 L 0 5 z" fill="#49755c"/></marker>
    <filter id="checkout-card-shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#101828" flood-opacity="0.08"/></filter>
  </defs>
  <text x="20" y="27" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="720" fill="#1b2430">Checkout fixture</text>
  <g transform="translate(0 42)">
    <g data-livery-connector="submission" data-livery-variant="directional">
      <path data-livery-id="submission" d="M 163.52739250000002 58 L 251.82607950000002 58" fill="none" stroke="#8793a2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#checkout-arrow-submission)"/>
      <rect x="172.52739250000002" y="39" width="70.298687" height="18" rx="2" fill="#f8f9fa" fill-opacity="0.98"/>
      <text x="207.676736" y="48" dominant-baseline="middle" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#687482">submit order</text>
    </g>
    <g data-livery-connector="persistence" data-livery-variant="directional">
      <path data-livery-id="persistence" d="M 396.1739205 58 L 484.4726075 58" fill="none" stroke="#49755c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#checkout-arrow-persistence)"/>
      <rect x="419.0920665" y="39" width="42.462395" height="18" rx="2" fill="#f8f9fa" fill-opacity="0.98"/>
      <text x="440.323264" y="48" dominant-baseline="middle" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#687482">persist</text>
    </g>
    <g data-livery-id="customer">
      <rect x="31.52739250000002" y="24" width="132" height="68" rx="6" fill="#ffffff" stroke="#d5dbe2" stroke-width="1"/>
      <g data-livery-glyph="person" transform="translate(52.52739250000002 49) scale(0.75)" fill="none" stroke="#687482" stroke-width="1.8666666666666665" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke">
        <path d="M20 21a8 8 0 0 0-16 0"/>
        <path d="M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/>
      </g>
      <text x="85.52739250000002" y="62" text-anchor="start" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#1b2430">
        <tspan x="85.52739250000002" dy="0">Customer</tspan>
      </text>
    </g>
    <g data-livery-id="api">
      <rect x="251.82607950000002" y="24" width="144.34784099999996" height="68" rx="6" fill="#ffffff" stroke="#d5dbe2" stroke-width="1"/>
      <g data-livery-glyph="service" transform="translate(270.8260795 49) scale(0.75)" fill="none" stroke="#687482" stroke-width="1.8666666666666665" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke">
        <path d="M4 5h16v14H4z"/>
        <path d="M8 9h8"/>
        <path d="M8 13h5"/>
      </g>
      <text x="301.8260795" y="62" text-anchor="start" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#1b2430">
        <tspan x="301.8260795" dy="0">Checkout API</tspan>
      </text>
    </g>
    <g data-livery-id="orders">
      <rect x="484.4726075" y="31" width="124" height="54" fill="#ffffff" stroke="#d5dbe2" stroke-width="1"/>
      <ellipse cx="546.4726075" cy="31" rx="62" ry="7" fill="#ffffff" stroke="#d5dbe2" stroke-width="1"/>
      <path d="M 484.4726075 85 A 62 7 0 0 0 608.4726075 85" fill="none" stroke="#d5dbe2" stroke-width="1"/>
      <text x="546.4726075" y="62" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#1b2430">
        <tspan x="546.4726075" dy="0">Orders</tspan>
      </text>
    </g>
  </g>
